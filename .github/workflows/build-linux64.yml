lname: build arm linux binaries

on:
  workflow_dispatch:
  
jobs:
  arm-linux:
    name: build-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            triplet: aarch64-linux-gnu
          - arch: armhf
            triplet: arm-linux-gnueabihf
            
    steps:
      - uses: actions/checkout@v4
      
      - name: setup qemu
        uses: docker/setup-qemu-action@v3

      - name: install dependencies
        run: |
          sudo dpkg --add-architecture ${{ matrix.arch }}
          sudo apt-get update
          sudo apt-get install -y gcc-${{ matrix.triplet }} g++-${{ matrix.triplet }} make pkg-config \
            libsdl2-dev:${{ matrix.arch }} libsdl2-image-dev:${{ matrix.arch }} zlib1g-dev:${{ matrix.arch }} \
            libogg-dev:${{ matrix.arch }} libvorbis-dev:${{ matrix.arch }} libopenal-dev:${{ matrix.arch }} libcurl4:${{ matrix.arch }}

      - name: prepare production build
        run: sed -i 's@//#define PRODUCTION@#define PRODUCTION@' source/src/cube.h
        
      - name: make
        run: |
          cd source/src
          make clean
          
          # Point pkg-config to the correct multiarch directories so it finds the arm libraries
          export PKG_CONFIG_PATH=/usr/lib/${{ matrix.triplet }}/pkgconfig:/usr/share/pkgconfig
          
          # Force make to use the cross-compiler tools
          make CC=${{ matrix.triplet }}-gcc \
               CXX=${{ matrix.triplet }}-g++ \
               AR=${{ matrix.triplet }}-ar \
               RANLIB=${{ matrix.triplet }}-ranlib
               
          make install
          cd ../..
        
      - name: prepare artifact
        run: |
          mkdir dist
          cp bin_unix/native_client dist/linux_${{ matrix.arch }}_client || echo "No client binary"
          cp bin_unix/native_server dist/linux_${{ matrix.arch }}_server || echo "No server binary"
          echo "you need to chmod 750 linux_${{ matrix.arch }}_*" > dist/info-make-executable.txt
        
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arm-linux-binaries-${{ matrix.arch }}
          path: dist
          
