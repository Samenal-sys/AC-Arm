name: build arm linux binaries

on:
  workflow_dispatch:
  
jobs:
  arm-linux:
    name: build-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            triplet: aarch64-linux-gnu
          - arch: armhf
            triplet: arm-linux-gnueabihf
            
    container:
      image: debian:bullseye
    
    steps:
      # 1. Setup networking/git so checkout runs smoothly inside the container
      - name: setup container prerequisites
        run: |
          apt-get update
          apt-get install -y git ca-certificates
          git config --global --add safe.directory '*'

      - uses: actions/checkout@v4

      - name: install dependencies
        run: |
          dpkg --add-architecture ${{ matrix.arch }}
          apt-get update
          
          # 2. Replaced libcurl4 with libcurl4-openssl-dev to ensure C++ headers exist
          apt-get install -y gcc-${{ matrix.triplet }} g++-${{ matrix.triplet }} make pkg-config \
            libsdl2-dev:${{ matrix.arch }} libsdl2-image-dev:${{ matrix.arch }} zlib1g-dev:${{ matrix.arch }} \
            libogg-dev:${{ matrix.arch }} libvorbis-dev:${{ matrix.arch }} libopenal-dev:${{ matrix.arch }} libcurl4-openssl-dev:${{ matrix.arch }}

      - name: prepare production build
        run: sed -i 's@//#define PRODUCTION@#define PRODUCTION@' source/src/cube.h
        
      - name: make
        run: |
          cd source/src
          make clean
          
          export PKG_CONFIG_PATH=/usr/lib/${{ matrix.triplet }}/pkgconfig:/usr/share/pkgconfig
          
          # 3. Forced all compiler and pkg-config tools to strictly use the multiarch triplet
          make CC=${{ matrix.triplet }}-gcc \
               CXX=${{ matrix.triplet }}-g++ \
               AR=${{ matrix.triplet }}-ar \
               RANLIB=${{ matrix.triplet }}-ranlib \
               PKG_CONFIG=${{ matrix.triplet }}-pkg-config \
               install
          cd ../..
        
      - name: prepare artifact
        run: |
          mkdir dist
          cp bin_unix/native_client dist/linux_${{ matrix.arch }}_client || echo "No client binary generated"
          cp bin_unix/native_server dist/linux_${{ matrix.arch }}_server || echo "No server binary generated"
          echo "you need to chmod 750 linux_${{ matrix.arch }}_*" > dist/info-make-executable.txt
        
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arm-linux-binaries-${{ matrix.arch }}
          path: dist
          
